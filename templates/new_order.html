{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg p-4">
            <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-scissors"></i> New Order & Measurements</h4>
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold">Select Customer</label>
                    <select name="customer_id" class="form-select p-3 border-0 bg-light" required>
                        {% for c in customers %}
                        <option value="{{ c.id }}">{{ c.name }} - {{ c.phone }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Garment Type</label>
                        <input type="text" name="garment_type" class="form-control p-3 border-0 bg-light" placeholder="Shirt / Pant / Blouse" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Due Date</label>
                        <input type="date" name="due_date" class="form-control p-3 border-0 bg-light" required>
                    </div>
                </div>

                <div class="bg-light p-4 rounded-4 mb-4">
                    <h6 class="fw-bold text-muted mb-3 text-uppercase">Body Measurements (Inches)</h6>
                    
                    <div class="row g-2 mb-3">
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Length</label>
                            <input type="number" name="length" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Chest/Bust</label>
                            <input type="number" name="chest" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Waist</label>
                            <input type="number" name="waist" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Hip</label>
                            <input type="number" name="hip" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Shoulder</label>
                            <input type="number" name="shoulder" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Sleeve Length</label>
                            <input type="number" name="sleeve" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Neck</label>
                            <input type="number" name="neck" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Thigh</label>
                            <input type="number" name="thigh" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                        <div class="col-6 col-md-4">
                            <label class="small fw-bold">Inseam</label>
                            <input type="number" name="inseam" class="form-control border-white shadow-sm text-center" placeholder="0" step="0.5">
                        </div>
                    </div>

                    <div class="alert alert-info small mb-0" style="background: rgba(13,110,253,0.1); border: 1px solid #0d6efd; color: #004085;">
                        <i class="bi bi-info-circle"></i> Leave fields empty if not needed for this garment
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Total Bill (₹)</label>
                    <input type="number" name="price" class="form-control p-3 border-0 bg-light fw-bold text-primary fs-4" placeholder="0.00" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 p-3 fw-bold rounded-3">Confirm Order</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg p-4">
            <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-box-seam"></i> Add Inventory Item</h4>
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold">Item Name</label>
                    <input type="text" name="item_name" class="form-control p-3 border-0 bg-light" placeholder="e.g., Cotton Fabric, Thread, Buttons" required>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Quantity</label>
                        <input type="number" name="quantity" class="form-control p-3 border-0 bg-light" placeholder="0" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Unit</label>
                        <select name="unit" class="form-control p-3 border-0 bg-light" required>
                            <option value="pcs">Pieces</option>
                            <option value="meter">Meter</option>
                            <option value="kg">Kilogram</option>
                            <option value="box">Box</option>
                            <option value="roll">Roll</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Minimum Stock Level</label>
                    <input type="number" name="min_stock" class="form-control p-3 border-0 bg-light" placeholder="5" value="5" required>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary flex-grow-1">Add Item</button>
                    <a href="/inventory" class="btn btn-light flex-grow-1">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
